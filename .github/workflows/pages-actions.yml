name: Pages Actions Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      UNLOCKED_UNTIL: ${{ vars.UNLOCKED_UNTIL }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 scripts/build_public_site.py
          touch public-site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public-site
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
