name: Pages Actions Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      UNLOCKED_UNTIL: ${{ vars.UNLOCKED_UNTIL }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build public site
        shell: bash
        run: |
          if [[ -z "${UNLOCKED_UNTIL}" || ! "${UNLOCKED_UNTIL}" =~ ^[0-9]+$ ]]; then
            echo "UNLOCKED_UNTIL is missing or invalid. Falling back to 1."
            export UNLOCKED_UNTIL=1
          fi
          echo "Building with UNLOCKED_UNTIL=${UNLOCKED_UNTIL}"
          python3 scripts/build_public_site.py
          touch public-site/.nojekyll
          test -f public-site/index.html
          find public-site -maxdepth 3 -type f | sort | head -100

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-site

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
